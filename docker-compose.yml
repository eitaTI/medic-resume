services:
  migrate:
    build:
      context: .
      target: migrator
    environment:
      - DATABASE_URL=file:/data/db/dev.db
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
    volumes:
      - sqlite-data:/data/db
      - uploads:/data/uploads:ro
    command: sh -c "pnpm exec prisma migrate deploy && pnpm exec tsx prisma/seed.ts"
    restart: "no"

  app:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/data/uploads
      - sqlite-data:/data/db
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      - DATABASE_URL=file:/data/db/dev.db
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
      - JIRA_BASE_URL=${JIRA_BASE_URL:-}
      - JIRA_EMAIL=${JIRA_EMAIL:-}
      - JIRA_API_TOKEN=${JIRA_API_TOKEN:-}
      - JIRA_PROJECT_KEY=${JIRA_PROJECT_KEY:-EITATI}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully

  backup:
    image: alpine:latest
    environment:
      DB_PATH: /data/db/dev.db
      UPLOADS_DIR: /data/uploads
      BACKUP_DIR: /backups
    volumes:
      - sqlite-data:/data/db:ro
      - uploads:/data/uploads:ro
      - ./backups:/backups
      - ./scripts:/scripts:ro
    entrypoint: |
      sh -c "
        apk add --no-cache sqlite bash &&
        echo '0 2 * * * cd /scripts && DB_PATH=/data/db/dev.db UPLOADS_DIR=/data/uploads BACKUP_DIR=/backups bash backup.sh' | crontab - &&
        crond -f -l 2
      "
    restart: unless-stopped
    depends_on:
      - app

volumes:
  uploads:
  sqlite-data:
