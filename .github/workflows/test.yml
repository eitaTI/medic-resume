name: Testes

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild native modules
        run: pnpm rebuild better-sqlite3

      - name: Configurar ambiente de teste
        # O Vitest força DATABASE_URL=file:<cwd>/test.db em tests/setup.ts.
        # O dev server do Playwright lê .env (BETTER_AUTH_SECRET etc.).
        # Segredos dummy — Jira é intencionalmente mockado/fail-open.
        run: |
          cp .env.example .env
          cp .env.example .env.test

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Testes unitários / integração (Vitest)
        run: pnpm test

      - name: Instalar navegadores do Playwright
        run: pnpm exec playwright install --with-deps chromium

      - name: Testes E2E (Playwright)
        run: pnpm test:e2e
        env:
          CI: 'true'
